name: Update Activity Feed

on:
  # Refresh every 6 hours
  schedule:
    - cron: "0 */6 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

# Prevent overlapping runs from racing on the same file
concurrency:
  group: activity-feed
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update activity section
        env:
          # Optional PAT (read-only Contents + Metadata) to include private repos.
          # Falls back to public repos only if unset.
          ACTIVITY_TOKEN: ${{ secrets.ACTIVITY_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: ${{ github.repository_owner }}
        run: node .github/scripts/update-activity.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update activity feed [skip ci]"
            git push
          fi
